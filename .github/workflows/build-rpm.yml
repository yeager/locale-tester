name: Build RPM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Get version
        id: version
        run: echo "version=$(grep -oP '__version__ = "\K[^"]+' src/locale_tester/__init__.py)" >> $GITHUB_OUTPUT

      - name: Setup RPM build
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          VERSION=${{ steps.version.outputs.version }}
          DIR=locale-tester-$VERSION
          mkdir -p $DIR/{locale_tester,data/icons,data/man,po/sv/LC_MESSAGES}
          cp src/locale_tester/*.py $DIR/locale_tester/
          cp data/se.danielnylander.LocaleTester.desktop $DIR/data/
          cp data/icons/se.danielnylander.locale-tester.svg $DIR/data/icons/
          cp data/man/locale-tester.1 $DIR/data/man/
          cp LICENSE $DIR/
          [ -f po/sv/LC_MESSAGES/locale-tester.mo ] && cp po/sv/LC_MESSAGES/locale-tester.mo $DIR/po/sv/LC_MESSAGES/
          tar czf ~/rpmbuild/SOURCES/$DIR.tar.gz $DIR

      - name: Create spec file
        run: |
          cat > ~/rpmbuild/SPECS/locale-tester.spec << 'SPEC'
          Name:           locale-tester
          Version:        VERSION_PLACEHOLDER
          Release:        1
          Summary:        Locale Tester - Test and compare system locales
          License:        GPL-3.0-or-later
          URL:            https://github.com/yeager/locale-tester
          Source0:        %{name}-%{version}.tar.gz
          BuildArch:      noarch
          Requires:       python3 >= 3.9
          Requires:       python3-gobject
          Requires:       gtk4
          Requires:       libadwaita

          %description
          A GTK4/Adwaita desktop application for testing and comparing system
          locales, showing how different locale settings affect formatting of
          dates, numbers, and currencies.

          %prep
          %setup -q

          %install
          mkdir -p %{buildroot}%{_datadir}/locale-tester/locale_tester
          cp locale_tester/*.py %{buildroot}%{_datadir}/locale-tester/locale_tester/

          mkdir -p %{buildroot}%{_bindir}
          cat > %{buildroot}%{_bindir}/locale-tester << 'LAUNCHER'
          #!/bin/bash
          exec python3 -c "import sys; sys.path.insert(0, '/usr/share/locale-tester'); from locale_tester.main import main; main()" "$@"
          LAUNCHER
          chmod 755 %{buildroot}%{_bindir}/locale-tester

          mkdir -p %{buildroot}%{_datadir}/applications
          cp data/se.danielnylander.LocaleTester.desktop %{buildroot}%{_datadir}/applications/

          mkdir -p %{buildroot}%{_datadir}/icons/hicolor/scalable/apps
          cp data/icons/se.danielnylander.locale-tester.svg %{buildroot}%{_datadir}/icons/hicolor/scalable/apps/

          mkdir -p %{buildroot}%{_mandir}/man1
          cp data/man/locale-tester.1 %{buildroot}%{_mandir}/man1/

          mkdir -p %{buildroot}%{_datadir}/locale/sv/LC_MESSAGES
          [ -f po/sv/LC_MESSAGES/locale-tester.mo ] && cp po/sv/LC_MESSAGES/locale-tester.mo %{buildroot}%{_datadir}/locale/sv/LC_MESSAGES/

          %files
          %license LICENSE
          %{_bindir}/locale-tester
          %{_datadir}/locale-tester/locale_tester/__init__.py
          %{_datadir}/locale-tester/locale_tester/__main__.py
          %{_datadir}/locale-tester/locale_tester/main.py
          %{_datadir}/applications/se.danielnylander.LocaleTester.desktop
          %{_datadir}/icons/hicolor/scalable/apps/se.danielnylander.locale-tester.svg
          %{_mandir}/man1/locale-tester.1*
          %{_datadir}/locale/sv/LC_MESSAGES/locale-tester.mo
          SPEC
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.version }}/" ~/rpmbuild/SPECS/locale-tester.spec

      - name: Build RPM
        run: rpmbuild -ba ~/rpmbuild/SPECS/locale-tester.spec

      - name: Upload RPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release upload "v$VERSION" \
            ~/rpmbuild/RPMS/noarch/locale-tester-${VERSION}-1.noarch.rpm \
            --clobber
