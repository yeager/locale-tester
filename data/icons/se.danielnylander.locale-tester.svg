<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c71d8"/>
      <stop offset="100%" stop-color="#164a8a"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="18" y="24" width="92" height="64" rx="6" fill="#1a1a1a" opacity="0.85"/>
  <circle cx="30" cy="34" r="3" fill="#f66151"/>
  <circle cx="40" cy="34" r="3" fill="#e5a50a"/>
  <circle cx="50" cy="34" r="3" fill="#57e389"/>
  <!-- Terminal text -->
  <text x="26" y="52" font-family="monospace" font-size="8" fill="#57e389" opacity="0.9">$ locale</text>
  <text x="26" y="62" font-family="monospace" font-size="7" fill="#99c1f1" opacity="0.7">LANG=sv_SE.UTF-8</text>
  <text x="26" y="72" font-family="monospace" font-size="7" fill="#99c1f1" opacity="0.7">LC_TIME=sv_SE</text>
  <text x="26" y="82" font-family="monospace" font-size="8" fill="#57e389" opacity="0.5">█</text>
  <!-- Checkmarks -->
  <g transform="translate(28,100)">
    <circle r="10" fill="#57e389" opacity="0.85"/>
    <path d="M-4,0 L-1,3 L4,-3" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="48" y="104" font-family="sans-serif" font-size="10" fill="white" opacity="0.7">sv_SE.UTF-8</text>
</svg>
